<!DOCTYPE html>
<html>
<head>
    <title>Cloud Compiler</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: white;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        textarea {
            width: 80%;
            background-color: #2d2d2d;
            color: #00ffcc;
            border: none;
            padding: 10px;
            font-size: 16px;
            border-radius: 10px;
            margin-top: 10px;
        }

        #code {
            height: 200px;
        }

        #input {
            height: 80px;
        }

        select {
            padding: 8px;
            margin-top: 10px;
            font-size: 16px;
            border-radius: 5px;
            background-color: #2d2d2d;
            color: white;
        }

        button {
            margin-top: 15px;
            padding: 10px 25px;
            font-size: 16px;
            background-color: #00c896;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #00a67d;
        }

        pre {
            width: 80%;
            margin: auto;
            margin-top: 20px;
            background-color: black;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            color: #00ffcc;
            min-height: 100px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <h2>☁️ Cloud Multi-Language Compiler</h2>

    <!-- Language Selection -->
    <h3>Select Language:</h3>
    <select id="language">
        <option value="python">Python</option>
        <option value="c">C</option>
    </select>

    <!-- Code Area -->
    <h3>Code:</h3>
    <textarea id="code">print("Hello from Cloud!")</textarea>

    <!-- Input Area -->
    <h3>Input:</h3>
    <textarea id="input" placeholder="Enter input here..."></textarea>

    <br>
    <button onclick="runCode()">Run Code</button>

    <!-- Output -->
    <h3>Output:</h3>
    <pre id="output">Output will appear here...</pre>

    <!-- JavaScript -->
    <script>
        function runCode() {
            const code = document.getElementById("code").value;
            const input = document.getElementById("input").value;
            const language = document.getElementById("language").value;

            document.getElementById("output").innerText = "Running...";

            fetch('/run', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    code: code,
                    input: input,
                    language: language
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.output && data.output.trim() !== "") {
                    document.getElementById("output").innerText = data.output;
                } else if (data.error) {
                    document.getElementById("output").innerText = data.error;
                } else {
                    document.getElementById("output").innerText = "No output";
                }
            })
            .catch(error => {
                document.getElementById("output").innerText =
                    "Error connecting to server";
            });
        }
    </script>

</body>
</html>
